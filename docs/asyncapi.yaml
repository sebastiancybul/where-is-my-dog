asyncapi: 3.1.0
info:
  title: Where Is My Dog – Chat WebSocket API
  version: 1.0.0
  description: >
    Real-time chat API over secure WebSockets (WSS) for the Where Is My Dog
    platform.


    ## Authentication

    Before opening a WebSocket connection the client must obtain a **single-use
    ticket**

    from `POST /api/ws-ticket/` (requires a valid session/JWT). The ticket has a
    **30-second TTL**

    and must be passed as the `ticket` query parameter when connecting.


    ## Connection URL

    ```

    wss://{host}/ws/chats/{conversationId}/?ticket={ticket}

    ```


    ## Auto-read on connect

    Upon a successful connection the server automatically marks all unread messages
    in the conversation as read for the connecting user and broadcasts an
    `all_messages_read` event to all participants (only if there were any unread
    messages).


    ## Conversation closure

    When a listing reaches a terminal status (FOUND / RETURNED / EXPIRED) the
    conversation

    is closed automatically. After that, sending `chat_message` returns an
    `error` with

    code `conversation_closed`.
channels:
  chat:
    address: '/ws/chats/{conversationId}/'
    description: >
      Bidirectional channel for real-time messaging within a single
      conversation.

      Only authenticated members of the conversation may connect.
    parameters:
      conversationId:
        description: Numeric ID of the conversation to join
    bindings:
      ws:
        query:
          type: object
          required:
            - ticket
          properties:
            ticket:
              type: string
              description: >-
                Single-use authentication ticket (30 s TTL) from POST
                /api/ws-ticket/
    messages:
      sendChatMessage:
        $ref: '#/components/messages/SendChatMessage'
      markRead:
        $ref: '#/components/messages/MarkRead'
      receiveChatMessage:
        $ref: '#/components/messages/ReceiveChatMessage'
      receiveMessageRead:
        $ref: '#/components/messages/MessageRead'
      receiveAllMessagesRead:
        $ref: '#/components/messages/AllMessagesRead'
      receiveError:
        $ref: '#/components/messages/Error'
  notifications:
    address: '/ws/notifications/'
    description: >
      Per-user channel for real-time notifications.

      The server pushes events whenever something relevant happens for the
      authenticated user (e.g. a new message arrives in one of their
      conversations). Clients never send messages on this channel.
    bindings:
      ws:
        query:
          type: object
          required:
            - ticket
          properties:
            ticket:
              type: string
              description: >-
                Single-use authentication ticket (30 s TTL) from POST
                /api/ws-ticket/
    messages:
      receiveNotification:
        $ref: '#/components/messages/Notification'
operations:
  sendChatMessage:
    action: send
    channel:
      $ref: '#/channels/chat'
    summary: Send a text message
    description: |
      Client sends a text message to the conversation.
      The message is broadcast to all connected participants.
    messages:
      - $ref: '#/channels/chat/messages/sendChatMessage'
  markRead:
    action: send
    channel:
      $ref: '#/channels/chat'
    summary: Mark a message as read
    description: |
      Client marks a specific message as read.
      The server broadcasts a `message_read` receipt to all participants.
    messages:
      - $ref: '#/channels/chat/messages/markRead'
  receiveChatMessage:
    action: receive
    channel:
      $ref: '#/channels/chat'
    summary: Receive a new chat message
    description: |
      Server broadcasts this event to all connected members of the conversation
      whenever a new message is sent (text or image upload).
    messages:
      - $ref: '#/channels/chat/messages/receiveChatMessage'
  receiveMessageRead:
    action: receive
    channel:
      $ref: '#/channels/chat'
    summary: Receive a read receipt
    description: |
      Server broadcasts this event to all connected members when any participant
      marks a message as read.
    messages:
      - $ref: '#/channels/chat/messages/receiveMessageRead'
  receiveAllMessagesRead:
    action: receive
    channel:
      $ref: '#/channels/chat'
    summary: Receive an all-messages-read broadcast
    description: |
      Server broadcasts this event to all connected members immediately after a
      participant connects, if that participant had any unread messages. Clients
      should mark all messages sent by the connecting user as read in their local
      state.
    messages:
      - $ref: '#/channels/chat/messages/receiveAllMessagesRead'
  receiveError:
    action: receive
    channel:
      $ref: '#/channels/chat'
    summary: Receive an error
    description: |
      Server sends an error frame directly to the client whose action failed.
      Other participants do NOT receive this event.
    messages:
      - $ref: '#/channels/chat/messages/receiveError'
  receiveNotification:
    action: receive
    channel:
      $ref: '#/channels/notifications'
    summary: Receive a user notification
    description: |
      Server pushes a notification to the authenticated user. The concrete
      event is carried in `event_type`:

      - `new_message` – another member of one of the user's conversations sent
        a message
      - `message_read` – a recipient read one of the user's messages
      - `all_messages_read` – a recipient connected to a conversation and read
        all of the user's previously unread messages in it
    messages:
      - $ref: '#/channels/notifications/messages/receiveNotification'
components:
  messages:
    SendChatMessage:
      name: SendChatMessage
      title: Send Chat Message
      summary: Client sends a text message to the conversation
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SendChatMessagePayload'
    MarkRead:
      name: MarkRead
      title: Mark Message as Read
      summary: Client marks a specific message as read
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MarkReadPayload'
    ReceiveChatMessage:
      name: ReceiveChatMessage
      title: Chat Message Broadcast
      summary: Server broadcasts a new message to all conversation participants
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReceiveChatMessagePayload'
    MessageRead:
      name: MessageRead
      title: Read Receipt Broadcast
      summary: Server broadcasts a read receipt to all conversation participants
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MessageReadPayload'
    AllMessagesRead:
      name: AllMessagesRead
      title: All Messages Read Broadcast
      summary: Server broadcasts that a user has read all messages on connect
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AllMessagesReadPayload'
    Error:
      name: Error
      title: Error
      summary: Server sends an error response to the originating client
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ErrorPayload'
    Notification:
      name: Notification
      title: User Notification
      summary: Server pushes a real-time notification to the authenticated user
      contentType: application/json
      payload:
        $ref: '#/components/schemas/NotificationPayload'
  schemas:
    SendChatMessagePayload:
      type: object
      required:
        - type
        - body
      properties:
        type:
          type: string
          const: chat_message
        body:
          type: string
          minLength: 1
          maxLength: 10000
          description: Text content of the message
      example:
        type: chat_message
        body: Czy ktoś widział mojego psa w okolicach Wilanowa?
    MarkReadPayload:
      type: object
      required:
        - type
        - message_id
      properties:
        type:
          type: string
          const: mark_read
        message_id:
          type: integer
          minimum: 1
          description: ID of the message to mark as read
      example:
        type: mark_read
        message_id: 42
    ReceiveChatMessagePayload:
      type: object
      required:
        - type
        - message_id
        - body
        - sender_id
        - sender_username
        - created_at
        - photos
      properties:
        type:
          type: string
          const: chat_message
        message_id:
          type: integer
          description: Unique identifier of the message
        body:
          type: string
          description: Text content (empty string for image-only messages)
        sender_id:
          type: integer
          description: User ID of the sender
        sender_username:
          type: string
          description: Username of the sender
        created_at:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp of message creation
        photos:
          type: array
          description: >
            Photos attached to the message. Always present; empty for
            text-only messages, one entry per uploaded image otherwise.
          items:
            $ref: '#/components/schemas/MessagePhoto'
      example:
        type: chat_message
        message_id: 42
        body: Czy ktoś widział mojego psa w okolicach Wilanowa?
        sender_id: 7
        sender_username: jan_kowalski
        created_at: '2026-05-22T14:30:00.000Z'
        photos: []
    MessagePhoto:
      type: object
      required:
        - id
        - url
        - uploaded_at
      properties:
        id:
          type: integer
          description: Unique identifier of the photo
        url:
          type: string
          format: uri
          description: Cloudinary secure URL of the uploaded image
        uploaded_at:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp of the upload
      example:
        id: 3
        url: https://res.cloudinary.com/demo/image/upload/v1/chats/photos/abc.jpg
        uploaded_at: '2026-05-22T14:31:00.000Z'
    MessageReadPayload:
      type: object
      required:
        - type
        - message_id
        - user_id
        - username
      properties:
        type:
          type: string
          const: message_read
        message_id:
          type: integer
          description: ID of the message that was read
        user_id:
          type: integer
          description: User ID of the reader
        username:
          type: string
          description: Username of the reader
      example:
        type: message_read
        message_id: 42
        user_id: 12
        username: anna_nowak
    AllMessagesReadPayload:
      type: object
      required:
        - type
        - user_id
        - username
      properties:
        type:
          type: string
          const: all_messages_read
        user_id:
          type: integer
          description: User ID of the participant who connected and read all messages
        username:
          type: string
          description: Username of that participant
      example:
        type: all_messages_read
        user_id: 12
        username: anna_nowak
    ErrorPayload:
      type: object
      required:
        - type
        - code
      properties:
        type:
          type: string
          const: error
        code:
          type: string
          enum:
            - invalid_json
            - invalid_message
            - conversation_closed
          description: >
            - `invalid_json` – client sent malformed JSON

            - `invalid_message` – missing or invalid fields (e.g. body too long,
            missing message_id)

            - `conversation_closed` – attempted to send a message to a closed
            conversation
      example:
        type: error
        code: conversation_closed
    NotificationPayload:
      type: object
      required:
        - type
        - event_type
        - payload
      properties:
        type:
          type: string
          const: new_notification
        event_type:
          type: string
          enum:
            - new_message
            - message_read
            - all_messages_read
          description: >
            Type of the notification event.

            - `new_message` – a new message was sent in one of the user's
            conversations

            - `message_read` – a recipient read one of the user's messages

            - `all_messages_read` – a recipient connected to a conversation and
            read all of the user's previously unread messages in it
        payload:
          type: object
          description: Event-specific data. Shape depends on `event_type`.
          oneOf:
            - $ref: '#/components/schemas/NewMessageNotificationPayload'
            - $ref: '#/components/schemas/MessageReadNotificationPayload'
            - $ref: '#/components/schemas/AllMessagesReadNotificationPayload'
    NewMessageNotificationPayload:
      type: object
      required:
        - conversation_id
        - last_message
      properties:
        conversation_id:
          type: integer
          description: ID of the conversation in which the message was sent
        last_message:
          type: object
          required:
            - id
            - body
            - has_photo
            - sender_id
            - created_at
          properties:
            id:
              type: integer
              description: ID of the new message
            body:
              type: string
              description: Text content of the message (empty for photo messages)
            has_photo:
              type: boolean
              description: >
                True if the message contains a photo. Clients should render a
                localized placeholder (e.g. "📷 Photo") instead of `body` when
                this is true.
            sender_id:
              type: integer
              description: User ID of the sender
            created_at:
              type: string
              format: date-time
              description: ISO 8601 UTC timestamp of message creation
      example:
        conversation_id: 5
        last_message:
          id: 42
          body: Has anyone seen my dog near the park?
          has_photo: false
          sender_id: 7
          created_at: '2026-05-22T14:30:00.000Z'
    MessageReadNotificationPayload:
      type: object
      required:
        - conversation_id
        - message_id
        - read_by_user_id
      properties:
        conversation_id:
          type: integer
          description: ID of the conversation containing the message
        message_id:
          type: integer
          description: ID of the message that was read
        read_by_user_id:
          type: integer
          description: User ID of the recipient who read the message
      example:
        conversation_id: 5
        message_id: 42
        read_by_user_id: 12
    AllMessagesReadNotificationPayload:
      type: object
      required:
        - conversation_id
        - read_by_user_id
      properties:
        conversation_id:
          type: integer
          description: ID of the conversation in which the messages were read
        read_by_user_id:
          type: integer
          description: User ID of the recipient who read all the messages
      example:
        conversation_id: 5
        read_by_user_id: 12
