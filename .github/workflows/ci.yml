name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:

jobs:
  backend:
    name: Backend (flake8 + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: whereismydog
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "False"
      DATABASE_URL: postgis://postgres:postgres@localhost:5432/whereismydog
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CLOUDINARY_CLOUD_NAME: placeholder
      CLOUDINARY_API_KEY: placeholder
      CLOUDINARY_API_SECRET: placeholder
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install GeoDjango libraries (GDAL/GEOS/PROJ)
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 .

      - name: Tests (Django)
        run: python manage.py test